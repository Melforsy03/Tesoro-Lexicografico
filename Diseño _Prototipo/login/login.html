<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Iniciar Sesion en Tesoro Lexicográfico Cubano</title>
    <!-- CUSTOM CSS -->
    <link rel="stylesheet" href="login.css">
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  
  <body>
    <div class="container">
      <div class="forms-container">
        <div class="signin-signup">
          <form action="" class="sign-in-form">
            <h2 class="title">Iniciar Sesion</h2>
            <div class="input-field">
              <i class="fas fa-user"></i>
              <input type="text" name="usuario" autocomplete="username" placeholder="Username" required="yes">
            </div>
            <div class="input-field">
              <i class="fas fa-lock"></i>
              <input type="password" name="contraseña" autocomplete="current-password" placeholder="Password" id="id_password" required="yes">
              <i class="far fa-eye" id="togglePassword" style="cursor: pointer;"></i>
            </div>
  
            <input type="submit" value="Iniciar Sesion" class="btn solid">
  
            <div class="social-media">
              <a class="icon-mode" onclick="toggleTheme('dark');"><i class="fas fa-moon"></i></a>
              <a class="icon-mode" onclick="toggleTheme('light');"><i class="fas fa-sun"></i></a>
            </div>
            <p class="text-mode">Change theme</p>
          </form>
          <form action="" class="sign-up-form">
            <h2 class="title">Registrarse</h2>
            <div class="input-field">
              <i class="fas fa-user"></i>
              <input type="text" name="usuario" autocomplete="username" placeholder="Username" required="yes">
            </div>
            <div class="input-field">
              <i class="fas fa-envelope"></i>
              <input type="email" name="correo" autocomplete="email" placeholder="Email" required="yes">
            </div>
            <div class="input-field">
              <i class="fas fa-lock"></i>
              <input type="password" name="contraseña" autocomplete="current-password" placeholder="Password" id="id_reg" required="yes">
              <i class="far fa-eye" id="toggleReg" style="cursor: pointer;"></i>
            </div>
  
            <input type="submit" value="Crear Cuenta" class="btn solid">
  
          </form>
        </div>
      </div>
      <div class="panels-container">
        <div class="panel left-panel">
          <div class="content">
            <h3>No tienes cuenta aun?</h3>
            <p>Create una cuenta ahora mismo para conocer palabras nuevas</p>
            <button class="btn transparent" id="sign-up-btn">Registrase</button>
          </div>
          
        </div>
  
        <div class="panel right-panel">
          <div class="content">
            <h3>Ya tiene una cuenta ?</h3>
            <p>Inicia sesion para descubrir palabras nuevas</p>
            <button class="btn transparent" id="sign-in-btn">Iniciar Sesion</button>
          </div>
        </div>
      </div>
    </div>
  
    <script src="login.js"></script>
  
  </body>
</html>
